name: Act Validation

'on':
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  act-validation:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ACT_VERSION: v0.2.80
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f
        with:
          persist-credentials: false
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@29eea2635ee0f92e42c05f4cd360b7f1a2f00b12
      - name: Install act
        run: |
          curl -fsSL "https://github.com/nektos/act/releases/download/${ACT_VERSION}/act_Linux_x86_64.tar.gz" |
            sudo tar -xz -C /usr/local/bin act
      - name: Check Docker runtime
        run: docker info
      - name: Run tests with act validation
        run: make test WITH_ACT=1
